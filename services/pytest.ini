[pytest]
testpaths =
    ocr-pipeline/tests
python_files = test_*.py
markers =
    logic: pure logic tests that must not call real cloud services
    contract: provider contract tests with fixed inputs and outputs
    integration: local orchestration tests using emulators or service containers
    requires_network: tests that need real network access and are not PR gating
    requires_aws: tests that need AWS credentials and are not PR gating
