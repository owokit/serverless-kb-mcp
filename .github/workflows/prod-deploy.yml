# EN: Perform the explicit, protected production rollout via manual dispatch only.
# CN: 仅通过手动触发执行显式且受保护的生产发布。
name: Prod Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy
        required: true
        type: string
      confirm_release_tag:
        description: Type the release tag again to confirm deployment
        required: true
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to deploy
        required: false
        default: main
        type: string
      confirm_release_tag:
        description: Type the release tag again to confirm deployment
        required: false
        default: main
        type: string

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  prod-deploy:
    environment: production
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OPENAI_API_BASE_URL: ${{ secrets.OPENAI_API_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBEDDING_MODEL: ${{ secrets.OPENAI_EMBEDDING_MODEL }}
      PADDLE_OCR_API_TOKEN: ${{ secrets.PADDLE_OCR_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Configure AWS credentials via OIDC
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: prod-deploy

      - name: Configure AWS credentials via static keys
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Fail when AWS credentials are not configured
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && (env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          set -euo pipefail
          echo "::error::Configure either AWS_ROLE_TO_ASSUME for GitHub OIDC, or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY for static AWS credentials."
          exit 1

      - name: Run production deploy entrypoint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CONFIRM_RELEASE_TAG: ${{ inputs.confirm_release_tag }}
        run: |
          set -euo pipefail

          ENTRYPOINT="scripts/prod-deploy.sh"
          if [ ! -f "$ENTRYPOINT" ] && [ -f "serverless-kb-mcp/scripts/prod-deploy.sh" ]; then
            ENTRYPOINT="serverless-kb-mcp/scripts/prod-deploy.sh"
          fi

          if [ ! -f "$ENTRYPOINT" ]; then
            echo "::error::prod deploy script not found at scripts/prod-deploy.sh or serverless-kb-mcp/scripts/prod-deploy.sh"
            exit 1
          fi

          bash "$ENTRYPOINT" --release-tag "$RELEASE_TAG" --confirm-release-tag "$CONFIRM_RELEASE_TAG"
