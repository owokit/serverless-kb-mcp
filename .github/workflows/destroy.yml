# EN: Tear down deployed resources only after explicit confirmation.
# CN: 仅在显式确认后再销毁已部署资源。
name: Destroy

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: Deployment name prefix used to derive resource names
        required: true
        default: mcp-doc-pipeline-prod
        type: string
      region:
        description: AWS region override; leave empty to use the repository secret
        required: false
        default: ""
        type: string
      confirm_destroy:
        description: Type the exact name prefix again to confirm destructive teardown
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: destroy-aws-resources
  cancel-in-progress: false

jobs:
  destroy-aws-resources:
    # EN: Use the production environment to scope secrets and enforce protection rules.
    # CN: 使用 production 环境限定密钥作用域并强制执行保护规则。
    environment: production
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ inputs.region || secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ inputs.region || secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MCP_ALLOW_PLACEHOLDER_ASSETS: "true"

    steps:
      # EN: Start from the same repository snapshot so teardown logic matches deploy naming.
      # CN: 从同一份仓库快照开始，确保销毁逻辑和部署命名一致。
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-node: true

      # EN: Prefer OIDC-based AWS credentials when a role ARN is configured.
      # CN: 当配置了 role ARN 时优先使用基于 OIDC 的 AWS 凭据。
      - name: Configure AWS credentials via OIDC
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: destroy-aws-resources

      # EN: Fall back to static AWS keys when OIDC is not configured.
      # CN: 未配置 OIDC 时回退到静态 AWS 密钥。
      - name: Configure AWS credentials via static keys
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      # EN: Fail immediately if no AWS credentials are available at all.
      # CN: 如果完全没有可用的 AWS 凭据，就立刻失败。
      - name: Fail when AWS credentials are not configured
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' && (env.AWS_ACCESS_KEY_ID == '' || env.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          set -euo pipefail
          echo "::error::Configure either AWS_ROLE_TO_ASSUME for GitHub OIDC, or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY for static AWS credentials."
          exit 1

      - name: Resolve CDK environment
        run: |
          set -euo pipefail
          echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"
          echo "CDK_DEFAULT_REGION=$AWS_REGION" >> "$GITHUB_ENV"

      # EN: Require the operator to confirm the exact name prefix before any destructive action.
      # CN: 在任何破坏性操作前，都要要求操作者确认精确的 name prefix。
      - name: Validate destroy confirmation
        run: |
          set -euo pipefail
          if [ "${{ inputs.name_prefix }}" != "${{ inputs.confirm_destroy }}" ]; then
            echo "::error::confirm_destroy does not match name_prefix"
            exit 1
          fi

          node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('pipeline-config.json', 'utf8'));
          if (config.name_prefix !== process.env.INPUT_NAME_PREFIX) {
            throw new Error(`name_prefix does not match pipeline-config.json: ${config.name_prefix}`);
          }
          NODE
        env:
          INPUT_NAME_PREFIX: ${{ inputs.name_prefix }}

      # EN: Install the CDK toolchain only after the cheap destructive-action confirmation passes.
      # CN: 只有在廉价的破坏性操作确认通过后，再安装 CDK 工具链。
      - name: Install CDK toolchain
        run: |
          set -euo pipefail
          npm ci --prefix infra/cdk --prefer-offline --no-audit --no-fund

      # EN: Destroy the CDK stack directly, using placeholder assets when packaging outputs are not present.
      # CN: 直接销毁 CDK 栈，在没有打包产物时使用占位资源。
      - name: Destroy AWS resources with CDK
        run: |
          set -euo pipefail
          npm --prefix infra/cdk run destroy -- --all --progress events
