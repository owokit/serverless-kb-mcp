# EN: Run optional network and AWS-marked tests outside the default PR gate.
# CN: 运行可选的网络和 AWS 标记测试，不进入默认 PR 门禁。
name: External Validation

on:
  workflow_dispatch:
    inputs:
      run_network_tests:
        description: Run network-marked tests against Gemini helpers
        required: false
        default: true
        type: boolean
      run_aws_tests:
        description: Run AWS-marked tests against local credentialed helpers
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: external-validation-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  network-validation:
    # EN: Only run when the operator explicitly enables network tests.
    # CN: 仅在操作者明确启用网络测试时运行。
    if: ${{ inputs.run_network_tests }}
    runs-on: ubuntu-latest

    steps:
      # EN: Keep the optional external test run tied to the exact repository revision being checked.
      # CN: 让可选外部测试绑定到当前检查的精确仓库修订版本。
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # EN: Prepare the Python environment used by the Gemini helper tests.
      # CN: 为 Gemini 辅助测试准备 Python 环境。
      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: true

      - name: Sync test tools
        run: |
          set -euo pipefail
          uv sync --locked --project services

      # EN: Fail early if the Gemini API key is missing so the optional external suite does not produce ambiguous failures.
      # CN: 如果 Gemini API key 缺失就提前失败，避免可选外部套件给出歧义报错。
      - name: Validate Gemini test prerequisites
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            echo "::error::Set GEMINI_API_KEY before running network-marked tests."
            exit 1
          fi

      # EN: Run the network-marked Gemini helper coverage as a separate optional workflow.
      # CN: 把标记为网络依赖的 Gemini 辅助覆盖单独作为可选 workflow 运行。
      - name: Run network-marked tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -euo pipefail
          uv run --project services python -m pytest -q examples/workflows/tests/reference/test_gemini_local_pipeline.py --maxfail=1

  aws-validation:
    # EN: Only run when the operator explicitly enables AWS tests.
    # CN: 仅在操作者明确启用 AWS 测试时运行。
    if: ${{ inputs.run_aws_tests }}
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      # EN: Keep the optional AWS checks aligned with the repository revision under review.
      # CN: 让可选 AWS 检查与当前审查的仓库修订版本保持一致。
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # EN: Prepare the Python environment used by the AWS helper tests.
      # CN: 为 AWS 辅助测试准备 Python 环境。
      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: true

      - name: Sync test tools
        run: |
          set -euo pipefail
          uv sync --locked --project services

      # EN: Fail early if no AWS credentials are configured so the manual run can be diagnosed quickly.
      # CN: 如果没有配置 AWS 凭据就提前失败，方便手动运行时快速定位问题。
      - name: Validate AWS test prerequisites
        run: |
          set -euo pipefail
          if [ -z "${AWS_ROLE_TO_ASSUME:-}" ] && [ -z "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "::error::Configure either AWS_ROLE_TO_ASSUME or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY before running AWS-marked tests."
            exit 1
          fi
          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error::Set AWS_REGION before running AWS-marked tests."
            exit 1
          fi

      # EN: Run the AWS-marked helper checks as a separate optional workflow.
      # CN: 把标记为 AWS 依赖的辅助检查单独作为可选 workflow 运行。
      - name: Run AWS-marked tests
        run: |
          set -euo pipefail
          uv run --project services python -m pytest -q examples/workflows/tests/reference/test_s3_vectors_check.py --maxfail=1
