# EN: Dependabot auto-merge is allowed only after the required checks succeed.
# CN: 仅在必需检查全部通过后，才允许 Dependabot PR 自动合并。
name: Dependabot Auto Merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    # EN: Limit auto-merge to Dependabot PRs targeting the main branch in this repository.
    # CN: 仅允许本仓库中目标分支为 main 的 Dependabot PR 自动合并。
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'owokit/serverless-ocr-s3vectors-mcp' && github.event.pull_request.base.ref == 'main'
    steps:
      # EN: Merge the Dependabot PR with auto-merge once the policy gate has already passed.
      # CN: 在策略门禁已经通过后，为 Dependabot PR 开启自动合并。
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
