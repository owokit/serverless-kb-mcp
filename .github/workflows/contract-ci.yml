# EN: Lock provider adapters and serialized payload shapes after logic checks pass.
# CN: 在逻辑检查通过后锁定 provider 适配器和序列化载荷形状。
name: Contract CI

on:
  workflow_run:
    workflows:
      - Logic CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: contract-ci-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

jobs:
  contract-ci:
    # EN: Only run when Logic CI succeeds or on manual dispatch.
    # CN: 仅在逻辑 CI 通过或手动触发时运行。
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: policy
            report: contract-policy-report.json
          - suite: storage
            report: contract-storage-report.json
          - suite: providers
            report: contract-providers-report.json
          - suite: orchestration
            report: contract-orchestration-report.json
          - suite: packaging
            report: contract-packaging-report.json
    name: Contract CI (${{ matrix.suite }})

    steps:
      # EN: Reuse the same repository snapshot so contract checks observe the exact downstream inputs.
      # CN: 复用同一份仓库快照，让契约检查看到完全一致的下游输入。
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download logic report
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v8
        with:
          name: logic-ci-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts/logic

      - name: Set up runtime
        uses: ./.github/actions/setup-runtime
        with:
          setup-python: true

      - name: Sync contract test tools
        run: |
          set -euo pipefail
          uv sync --locked --project services

      # EN: Split the contract surface by domain so each matrix lane stays easy to rerun and diagnose.
      # CN: 按领域拆分契约面，让每条矩阵分支都更容易重跑和定位。
      - name: Run contract suite
        id: suite
        run: |
          set -euo pipefail
          case "${{ matrix.suite }}" in
            policy)
              uv run --project services python -m pytest -q \
                tools/ci/tests/deployment_helpers/test_cdk_workflows.py \
                services/ocr-pipeline/tests/unit/runtime/test_embedding_profile_runtime_guards.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_aws_resolution.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_policy.py \
                --maxfail=1
              ;;
            storage)
              uv run --project services python -m pytest -q \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_config.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_delivery.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_dynamo_batch.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_event_parser.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_paths.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_repository.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_schema.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_object_state_repository.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_vector_repository.py \
                --maxfail=1
              ;;
            providers)
              uv run --project services python -m pytest -q \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_embedding_schema.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_gemini_client.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_openai_client.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_paddle_async_client.py \
                --maxfail=1
              ;;
            orchestration)
              uv run --project services python -m pytest -q \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_backfill.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_handler.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_parser.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_worker.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_embedding_runtime.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_extract_handler.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_extract_service.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_ingest.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_ingest_handler.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_job_status_handler.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_lambda_entrypoints.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_pipeline.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_query_api.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_query_service.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_remote_mcp_handler.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_remote_mcp_smoke.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_state_machine_definition.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_step_functions_workflow.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_worker.py \
                --maxfail=1
              ;;
            packaging)
              uv run --project services python -m pytest -q \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_lambda_artifact_scripts.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_markdown_extractor.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_package_lambda.py \
                services/ocr-pipeline/tests/unit/serverless_mcp/test_paddle_manifest_builder.py \
                --maxfail=1
              ;;
            *)
              echo "Unknown contract suite: ${{ matrix.suite }}"
              exit 1
              ;;
          esac

      - name: Write contract CI summary
        if: always()
        env:
          REPORT_PATH: ${{ matrix.report }}
          CONTRACT_SUITE: ${{ matrix.suite }}
          SUITE_OUTCOME: ${{ steps.suite.outcome }}
        run: |
          set -euo pipefail
          uv run --project services python <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          suite = os.environ["CONTRACT_SUITE"]
          report_path = Path(os.environ["REPORT_PATH"])
          suite_outcome = os.environ.get("SUITE_OUTCOME", "success")
          tests_by_suite = {
              "policy": [
                  "tools/ci/tests/deployment_helpers/test_cdk_workflows.py",
                  "services/ocr-pipeline/tests/unit/runtime/test_embedding_profile_runtime_guards.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_aws_resolution.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_policy.py",
              ],
              "storage": [
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_config.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_delivery.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_dynamo_batch.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_event_parser.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_paths.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_repository.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_manifest_schema.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_object_state_repository.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_vector_repository.py",
              ],
              "providers": [
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_embedding_schema.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_gemini_client.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_openai_client.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_paddle_async_client.py",
              ],
              "orchestration": [
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_backfill.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_handler.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_parser.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_embed_worker.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_embedding_runtime.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_extract_handler.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_extract_service.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_ingest.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_ingest_handler.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_job_status_handler.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_lambda_entrypoints.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_pipeline.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_query_api.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_query_service.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_remote_mcp_handler.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_remote_mcp_smoke.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_state_machine_definition.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_step_functions_workflow.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_worker.py",
              ],
              "packaging": [
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_lambda_artifact_scripts.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_markdown_extractor.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_package_lambda.py",
                  "services/ocr-pipeline/tests/unit/serverless_mcp/test_paddle_manifest_builder.py",
              ],
          }

          report = {
              "workflow": "Contract CI",
              "suite": suite,
              "logic_report_present": Path("artifacts/logic/logic-ci-report.json").exists(),
              "selected_tests": tests_by_suite[suite],
              "status": "passed" if suite_outcome == "success" else "failed",
          }
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: contract-ci-${{ matrix.suite }}-report
          path: ${{ matrix.report }}
          if-no-files-found: error

      # EN: Push contract failures back to the linked PR so downstream reviewers see the exact gate that broke.
      # CN: 把契约失败回写到关联 PR，方便后续审查者直接看到是哪一层门禁坏掉。
