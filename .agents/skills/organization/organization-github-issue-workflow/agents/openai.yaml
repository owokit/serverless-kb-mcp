interface:
  display_name: "GitHub Issue 工作流"
  short_description: "以根因、文件、修复、验证和回滚为重点的 issue 优先跟踪"
  default_prompt: "Use $github-issue-workflow to track GitHub work with issue-first triage, root-cause analysis, related files, fix options, validation, labels, and concise progress comments using the Checkpoint/Change/Remaining/Blocker/Evidence format."

dependencies:
  tools:
    - type: "mcp"
      value: "github"
      description: "GitHub MCP server"
      transport: "streamable_http"
      url: "https://api.githubcopilot.com/mcp/"

policy:
  allow_implicit_invocation: true
